name: 🌊 Tidal SR01 - 30min PNG Direct to Repo (PRODUCTION)

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes (:00, :30)
  workflow_dispatch:

jobs:
  tidal-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Git commit permission
    
    steps:
    # 1. Checkout code
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for rebase
    
    # 2. Python setup
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # 3. Install dependencies
    - name: Install requirements
      run: |
        pip install --upgrade pip
        pip install pandas numpy matplotlib requests
        pip install -r requirements.txt || echo "No reqs file"
    
    # 4. Run tidal analysis (tolerate minor errors)
        - name: Generate PNG + CSV
      run: python tidal_analysis.py
      continue-on-error: true
    
    # 5. Verify files created
    - name: List generated files
      run: |
        echo "=== FILES GENERATED ==="
        ls -la *.csv *.png || echo "No PNG!"
        echo "=== END ==="
    
    # 6. Copy to repo root (DIRECT PNG ACCESS!)
    - name: Copy to plots directory
      run: |
        mkdir -p plots
        cp *.png *.csv plots/ || echo "No files to copy"
        ls -la plots/
    
    # 7. Git commit PNGs to main (SAFE PUSH)
    - name: Commit PNGs to repo
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "Tidal Auto-Bot"
        git add plots/
        git pull --rebase --autostash || echo "Pull skipped"
        timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        git commit -m "Hourly tidal update #${{ github.run_number }} (${timestamp})" || echo "No changes"
        git push --force-with-lease || echo "Push skipped"
    
    # 8. ZIP backup
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: tidal-files-${{ github.run_number }}
        path: |
          plots/*
          *.csv
          *.png
    
    # 9. Success summary
    - name: Summary
      run: |
        echo "✅ SUCCESS! PNGs committed to repo root"
        echo "📱 Direct access: https://github.com/${{ github.repository }}/tree/main/plots"
        echo "🖼️  Raw PNG: https://raw.githubusercontent.com/${{ github.repository }}/main/plots/plot4_negdeviasi.png"
