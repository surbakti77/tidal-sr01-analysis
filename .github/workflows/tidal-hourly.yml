name: 🌊 Tidal SR01 Analysis Hourly

on:
  schedule:
    # CRON: 0 * * * * = setiap jam :00
    - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger button
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Untuk releases
    
    steps:
    # 1. Checkout code
    - uses: actions/checkout@v4
    
    # 2. Setup Python 3.11
    - name: Set Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # 3. Install dependencies
    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # 4. Run Tidal Analysis
    - name: 🏄 Run Tidal Analysis
      run: python tidal_analysis.py
    
    # 5. Create Release dengan timestamp
    - name: 📦 Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.run_number }}
        name: Tidal Analysis ${{ github.run_number }} (${{ github.event_name }})
        body: |
          **Run at:** ${{ github.event.head_commit.message || github.run_number }}
          **Files:** CSV + 4 PNG plots
          **Data:** Entry 1859+, 10min interval
        draft: false
        prerelease: false
        files: |
          field2_tidal*.csv
          plot*.png
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # 6. Notify (opsional)
    - name: 💬 Discord Notify
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
